apiVersion: batch/v1
kind: Job
metadata:
  name: install-crds
  namespace: capi
spec:
  ttlSecondsAfterFinished: 0
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: crd-installer
      containers:
      - name: installer
        image: your-registry/capi-controller:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          for f in /crds/kubean/*.yaml; do
            kubectl apply -f "$f"
          done
          for f in /crds/cluster-api/*.yaml; do
            kubectl apply -f "$f"
          done
          for f in /crds/capo/*.yaml; do
            kubectl apply -f "$f"
          done
          echo "All CRDs installed successfully."
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crd-installer
  namespace: capi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crd-installer
rules:
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crd-installer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crd-installer
subjects:
- kind: ServiceAccount
  name: crd-installer
  namespace: capi
