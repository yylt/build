apiVersion: v1
kind: Namespace
metadata:
  name: capi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-api-manager
  namespace: capi
  labels:
    app: cluster-api-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-api-manager
  template:
    metadata:
      labels:
        app: cluster-api-manager
    spec:
      serviceAccountName: capi-manager
      containers:
      - name: manager
        image: your-registry/capi-controller:latest
        command: ["/bins/cluster-api-manager"]
        args:
        - --leader-elect
        - --metrics-bind-addr=:8080
        - --health-probe-bind-addr=:8081
        ports:
        - name: metrics
          containerPort: 8080
        - name: health
          containerPort: 8081
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
